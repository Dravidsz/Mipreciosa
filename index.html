<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Preciosa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="background-container">
        <div id="background-image"></div>
    </div>

    <button id="change-bg-btn" class="floating-btn" title="Cambiar fondo">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
        </svg>
    </button>

    <div class="app">
        <!-- Navegación -->
        <nav class="nav">
            <h1 class="logo">Mi Preciosa</h1>
            <div class="nav-tabs">
                <button class="nav-tab active" data-section="pomodoro">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span>Pomodoro</span>
                </button>
                <button class="nav-tab" data-section="todo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                    <span>Tareas</span>
                </button>
                <button class="nav-tab" data-section="eisenhower">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Eisenhower</span>
                </button>
                <button class="nav-tab" data-section="kanban">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    <span>Kanban</span>
                </button>
            </div>
        </nav>

        <!-- Contenido -->
        <main class="content">
            <!-- POMODORO -->
            <section id="pomodoro" class="section active">
                <div class="card pomodoro-card">
                    <div class="pomodoro-timer">
                        <svg class="timer-circle" viewBox="0 0 100 100">
                            <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="timer-progress" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div class="timer-display">
                            <span id="timer-minutes">25</span>
                            <span class="timer-separator">:</span>
                            <span id="timer-seconds">00</span>
                        </div>
                    </div>
                    <div class="pomodoro-modes">
                        <button class="mode-btn active" data-mode="work">Trabajo</button>
                        <button class="mode-btn" data-mode="shortBreak">Descanso</button>
                        <button class="mode-btn" data-mode="longBreak">Largo</button>
                    </div>
                    <div class="pomodoro-controls">
                        <button id="timer-start" class="btn primary">Iniciar</button>
                        <button id="timer-pause" class="btn" disabled>Pausar</button>
                        <button id="timer-reset" class="btn">Reiniciar</button>
                    </div>
                    <div class="pomodoro-stats">
                        <span class="stat-value" id="pomodoro-count">0</span>
                        <span class="stat-label">Pomodoros completados</span>
                    </div>
                </div>
            </section>

            <!-- TAREAS -->
            <section id="todo" class="section">
                <div class="card">
                    <div class="todo-input-wrapper">
                        <input type="text" id="todo-input" placeholder="Nueva tarea...">
                        <button id="add-todo" class="btn-add">+</button>
                    </div>
                    <ul id="todo-list" class="todo-list"></ul>
                    <div class="todo-footer">
                        <span id="todo-count">0 tareas</span>
                        <button id="clear-completed" class="btn-text">Limpiar completadas</button>
                    </div>
                </div>
            </section>

            <!-- EISENHOWER -->
            <section id="eisenhower" class="section">
                <div class="card eisenhower-card">
                    <div class="eisenhower-grid">
                        <div class="matrix-quadrant" data-quadrant="do">
                            <h3>Hacer</h3>
                            <div class="quadrant-tasks" data-quadrant="do"></div>
                            <input type="text" placeholder="+" class="quadrant-input">
                        </div>
                        <div class="matrix-quadrant" data-quadrant="schedule">
                            <h3>Programar</h3>
                            <div class="quadrant-tasks" data-quadrant="schedule"></div>
                            <input type="text" placeholder="+" class="quadrant-input">
                        </div>
                        <div class="matrix-quadrant" data-quadrant="delegate">
                            <h3>Delegar</h3>
                            <div class="quadrant-tasks" data-quadrant="delegate"></div>
                            <input type="text" placeholder="+" class="quadrant-input">
                        </div>
                        <div class="matrix-quadrant" data-quadrant="eliminate">
                            <h3>Eliminar</h3>
                            <div class="quadrant-tasks" data-quadrant="eliminate"></div>
                            <input type="text" placeholder="+" class="quadrant-input">
                        </div>
                    </div>
                </div>
            </section>

            <!-- KANBAN -->
            <section id="kanban" class="section">
                <div class="card kanban-card">
                    <div class="kanban-grid">
                        <div class="kanban-column" data-column="todo">
                            <div class="column-header">
                                <h3>Por Hacer</h3>
                                <span class="task-count" id="todo-count">0</span>
                            </div>
                            <div class="column-tasks" data-column="todo"></div>
                            <input type="text" placeholder="+" class="column-input">
                        </div>
                        <div class="kanban-column" data-column="inprogress">
                            <div class="column-header">
                                <h3>Progreso</h3>
                                <span class="task-count" id="inprogress-count">0</span>
                            </div>
                            <div class="column-tasks" data-column="inprogress"></div>
                            <input type="text" placeholder="+" class="column-input">
                        </div>
                        <div class="kanban-column" data-column="done">
                            <div class="column-header">
                                <h3>Hecho</h3>
                                <span class="task-count" id="done-count">0</span>
                            </div>
                            <div class="column-tasks" data-column="done"></div>
                            <input type="text" placeholder="+" class="column-input">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/background.js"></script>
    <script src="js/pomodoro.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/eisenhower.js"></script>
    <script src="js/kanban.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
